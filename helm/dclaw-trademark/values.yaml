replicaCount: 1

frontend:
  image:
    repository: dclaw-trademark-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3055
  ingress:
    enabled: false

backend:
  image:
    repository: dclaw-trademark-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8141
  env:
    TRADEMARK_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_trademark"

database:
  name: dclaw_trademark
